name: Manual Workflow Dispatch Trigger
on:
  workflow_dispatch:
    inputs:
      command:
        description: 'Command to execute e2e tests default: npm run test-playwright-web-headless'
        required: true
        default: 'test-playwright-web-headless'

jobs:
  e2eTests:
    runs-on: ubuntu-latest
    steps:
      - name: Checking out default branch
        uses: actions/checkout@v4
        with:
          ref: develop
          submodules: true
      - name: Checkout TestData
        uses: actions/checkout@v4
        with:
          repository: tagspaces/testdata
          path: tests/testdata
      - name: Configure NPM for TagSpaces Pro
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          always-auth: true
          registry-url: https://npm.pkg.github.com/
          scope: '@tagspacespro'
      - name: Running npm install, prettier and type checks
        run: |
          npm install
          npm run prettier-check
          npm run type-check
        env:
          NODE_AUTH_TOKEN: ${{ secrets.TSPNPMINSTALL }}
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Run Unit tests
        run: npm run test-unit
      - name: Cache S3Proxy JAR
        id: cache-s3proxy
        uses: actions/cache@v4
        with:
          path: tests/s3proxy.jar
          key: s3proxy-3.0.0
      - name: Download S3Proxy
        if: steps.cache-s3proxy.outputs.cache-hit != 'true'
        run: curl -sL -o tests/s3proxy.jar "https://repo1.maven.org/maven2/org/gaul/s3proxy/3.0.0/s3proxy-3.0.0-jar-with-dependencies.jar"
      - name: Run Electron tests
        run: |
          npm run build-e2e
          npm run ${{ github.event.inputs.command }}
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-pages
          path: tests/test-pages/
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-artifacts
          path: |
            tests/test-pages/
            tests/test-reports/
