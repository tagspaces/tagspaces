name: Pull Request Workflow Dispatch Trigger
on: pull_request

jobs:
  e2eTestsWin:
    name: Test desktop pro app on Windows
    runs-on: windows-latest
    env:
      PD_PLATFORM: node
    steps:
      - name: Checking out default branch
        uses: actions/checkout@v4
        with:
          submodules: true
      - name: Checkout TestData
        uses: actions/checkout@v4
        with:
          repository: tagspaces/testdata
          path: tests/testdata
      - name: Configure NPM for TagSpaces Pro
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          always-auth: true
          registry-url: https://npm.pkg.github.com/
          scope: '@tagspacespro'
      - name: Running npm install, prettier and type checks
        run: |
          npm install
          npm run prettier-check
          npm run type-check
        env:
          NODE_AUTH_TOKEN: ${{ secrets.TSPNPMINSTALL }}
      - name: Run Unit tests
        run: npm run test-unit
      - name: Run Electron tests
        run: |
          npm run build-e2e
          npm run test-playwright
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-artifacts-desktop-win
          path: |
            test-results/
            tests/test-reports/
            playwright-report/
  e2eTestsWinS3:
    name: Test desktop pro app on Mac with S3Proxy
    runs-on: macos-latest
    env:
      PD_PLATFORM: node
    steps:
      - name: Checking out default branch
        uses: actions/checkout@v4
        with:
          submodules: true
      - name: Checkout TestData
        uses: actions/checkout@v4
        with:
          repository: tagspaces/testdata
          path: tests/testdata
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Configure NPM for TagSpaces Pro
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          always-auth: true
          registry-url: https://npm.pkg.github.com/
          scope: '@tagspacespro'
      - name: Running npm install, prettier and type checks
        run: |
          npm install
          npm run prettier-check
          npm run type-check
        env:
          NODE_AUTH_TOKEN: ${{ secrets.TSPNPMINSTALL }}
      - name: Run Unit tests
        run: npm run test-unit
      - name: Cache S3Proxy JAR
        id: cache-s3proxy
        uses: actions/cache@v4
        with:
          path: tests/s3proxy.jar
          key: s3proxy-3.0.0
      - name: Download S3Proxy
        if: steps.cache-s3proxy.outputs.cache-hit != 'true'
        run: curl -sL -o tests/s3proxy.jar "https://repo1.maven.org/maven2/org/gaul/s3proxy/3.0.0/s3proxy-3.0.0-jar-with-dependencies.jar"
      - name: Run Electron tests
        run: |
          npm run build-e2e
          npm run test-playwright-s3
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-artifacts-desktop-s3-win
          path: |
            test-results/
            tests/test-reports/
            playwright-report/
  e2eTestsWebWin:
    name: Test web pro app on Windows with S3Proxy
    runs-on: windows-latest
    env:
      PD_PLATFORM: web
    steps:
      - name: Checking out default branch
        uses: actions/checkout@v4
        with:
          submodules: true
      - name: Checkout TestData
        uses: actions/checkout@v4
        with:
          repository: tagspaces/testdata
          path: tests/testdata
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Configure NPM for TagSpaces Pro
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          always-auth: true
          registry-url: https://npm.pkg.github.com/
          scope: '@tagspacespro'
      - name: Running npm install, prettier and type checks
        run: |
          npm install
          npm run prepare-web-pro
          npm run prettier-check
          npm run type-check
        env:
          NODE_AUTH_TOKEN: ${{ secrets.TSPNPMINSTALL }}
      - name: Run Unit tests
        run: npm run test-unit
      - name: Cache S3Proxy JAR
        id: cache-s3proxy
        uses: actions/cache@v4
        with:
          path: tests/s3proxy.jar
          key: s3proxy-3.0.0
      - name: Download S3Proxy
        if: steps.cache-s3proxy.outputs.cache-hit != 'true'
        run: curl -sL -o tests/s3proxy.jar "https://repo1.maven.org/maven2/org/gaul/s3proxy/3.0.0/s3proxy-3.0.0-jar-with-dependencies.jar"
      - name: Run E2E tests
        run: |
          npm run build-e2e-web
          npm run test-playwright-web-headless
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-artifacts-web-s3-win
          path: |
            test-results/
            tests/test-reports/
            playwright-report/
  e2eTestsWebMac:
    name: Test web pro app on Mac OS with S3Proxy
    runs-on: macos-latest
    env:
      PD_PLATFORM: web
    steps:
      - name: Checking out default branch
        uses: actions/checkout@v4
        with:
          submodules: true
      - name: Checkout TestData
        uses: actions/checkout@v4
        with:
          repository: tagspaces/testdata
          path: tests/testdata
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Configure NPM for TagSpaces Pro
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          always-auth: true
          registry-url: https://npm.pkg.github.com/
          scope: '@tagspacespro'
      - name: Running npm install, prettier and type checks
        run: |
          npm install
          npm run prepare-web-pro
          npm run prettier-check
          npm run type-check
        env:
          NODE_AUTH_TOKEN: ${{ secrets.TSPNPMINSTALL }}
      - name: Run Unit tests
        run: npm run test-unit
      - name: Cache S3Proxy JAR
        id: cache-s3proxy
        uses: actions/cache@v4
        with:
          path: tests/s3proxy.jar
          key: s3proxy-3.0.0
      - name: Download S3Proxy
        if: steps.cache-s3proxy.outputs.cache-hit != 'true'
        run: curl -sL -o tests/s3proxy.jar "https://repo1.maven.org/maven2/org/gaul/s3proxy/3.0.0/s3proxy-3.0.0-jar-with-dependencies.jar"
      - name: Run E2E tests
        run: |
          npm run build-e2e-web
          npm run test-playwright-web-headless
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-artifacts-web-mac-s3
          path: |
            test-results/
            tests/test-reports/
            playwright-report/
